name: Build and Test

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/orchestrator/requirements.txt -r services/orchestrator/requirements-dev.txt

      - name: Run backend lint
        run: python -m ruff check services/orchestrator services/router services/memory services/analyst packages/contracts/python

      - name: Run backend tests
        env:
          PYTHONPATH: services/orchestrator:.
        run: |
          python -m pytest \
            services/orchestrator/tests \
            services/router/tests \
            services/memory/tests \
            services/analyst/tests \
            packages/contracts/python/test_models.py

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint and typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Run smoke test
        run: npm run test:smoke

      - name: Build frontend
        run: npm run build
