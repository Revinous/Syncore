name: Build and Test

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/orchestrator/requirements.txt -r services/orchestrator/requirements-dev.txt

      - name: Run backend lint
        run: python -m ruff check services/orchestrator services/router services/memory services/analyst packages/contracts/python

      - name: Run Python static analysis
        run: |
          python -m mypy --follow-imports=skip \
            services/orchestrator/app/services/autonomy_runtime_selector.py \
            services/orchestrator/app/services/autonomy_task_gate.py \
            services/orchestrator/app/services/autonomy_quality_gate.py \
            services/orchestrator/app/services/autonomy_failure_handler.py \
            services/orchestrator/app/services/workspace_planner.py \
            services/orchestrator/app/services/workspace_preflight_service.py \
            services/orchestrator/app/services/workspace_action_dispatcher.py \
            services/orchestrator/app/services/workspace_execution_finalizer.py \
            services/orchestrator/app/runs/provider_transport.py

      - name: Run security scan
        run: python -m bandit -q -c pyproject.toml -r services/orchestrator/app/runs services/orchestrator/app/api services/orchestrator/app/services

      - name: Run structural guardrails
        run: python scripts/structural_guardrails.py

      - name: Run backend tests with coverage
        env:
          PYTHONPATH: services/orchestrator:.
        run: |
          python -m pytest \
            services/orchestrator/tests \
            services/router/tests \
            services/memory/tests \
            services/analyst/tests \
            packages/contracts/python/test_models.py

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint and typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Run smoke test
        run: npm run test:smoke

      - name: Build frontend
        run: npm run build
